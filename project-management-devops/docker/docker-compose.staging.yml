version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: project_management_staging
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: staging_password
    ports:
      - "5434:5432"
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
      - ../sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d project_management_staging"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    env_file:
      - ../backend/.env.staging
    environment:
      DATABASE_URL: postgres://app_user:staging_password@postgres:5432/project_management_staging
      DB_SSL: "false"
      JWT_SECRET: staging-secret-change-me
      CORS_ORIGINS: http://localhost:5173
      PORT: 3000
    ports:
      - "3002:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  pgdata_staging:
