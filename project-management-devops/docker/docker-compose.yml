version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: project_management
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: local_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d project_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    env_file:
      - ../backend/.env.example
    environment:
      DATABASE_URL: postgres://app_user:local_password@postgres:5432/project_management
      DB_SSL: "false"
      JWT_SECRET: local-dev-secret-change-me
      CORS_ORIGINS: http://localhost:5173
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata: