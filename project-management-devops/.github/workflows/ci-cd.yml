name: ci-cd

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  BACKEND_IMAGE: project-management-backend
  FRONTEND_IMAGE: project-management-frontend

jobs:
  build-test:
    name: Stage 1-3 | Install, Test, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint and test backend
        run: |
          cd backend
          npm run lint
          npm run test

      - name: Lint and test frontend
        run: |
          cd frontend
          npm run lint
          npm run test

      - name: Build Docker images
        run: |
          docker build -f docker/backend.Dockerfile -t $BACKEND_IMAGE:${{ github.sha }} .
          docker build -f docker/frontend.Dockerfile -t $FRONTEND_IMAGE:${{ github.sha }} .

  deploy:
    name: Stage 4-6 | Push ECR, Terraform Deploy, Invalidate CDN
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_BACKEND_REPO }}
        run: |
          docker build -f docker/backend.Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      - name: Build frontend and sync to S3
        run: |
          cd frontend
          npm ci
          npm run build
          aws s3 sync dist/ s3://${{ secrets.FRONTEND_S3_BUCKET }} --delete

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init/plan/apply
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERT_ARN }}
          TF_VAR_account_suffix: ${{ secrets.ACCOUNT_SUFFIX }}
          TF_VAR_backend_ecr_image: ${{ secrets.BACKEND_ECR_IMAGE }}
          TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
        run: |
          cd infra/terraform
          terraform init
          terraform plan -var-file=../environments/prod.tfvars
          terraform apply -auto-approve -var-file=../environments/prod.tfvars

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths '/*'